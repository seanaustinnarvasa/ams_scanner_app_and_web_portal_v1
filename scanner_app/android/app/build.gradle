def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.appdistribution'

dependencies {
    configurations.all {
        exclude group: 'com.google.zxing'
    }
}

android {
    compileSdkVersion flutter.compileSdkVersion
//    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    aaptOptions {
        cruncherEnabled = false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "ams.scanner"
        minSdkVersion 20
        targetSdkVersion flutter.targetSdkVersion
        versionCode 32320215
        versionName "v2.6.15"
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    /* /// --- WISEASY SDK --- ///
        implementation files('libs/SDK4EmvBinderV2.2.13.jar')
        implementation files('libs/SDK4BaseBinderV2.2.12.jar')
        implementation files('libs/SDK4KeyManagerBinderV2.2.06.jar') */

    /// --- FIREBASE APP DISTRIBUTION --- ///
    //com.google.firebase:firebase-appdistribution-api-ktx:16.0.0-be
    implementation("com.google.firebase:firebase-appdistribution-api:16.0.0-beta10")
    implementation platform('com.google.firebase:firebase-bom:32.2.3')
    implementation 'com.google.firebase:firebase-core:9.6.1'

    /// --- TELPO SDK --- ///
    implementation files('libs/emv_20230411.aar')

    implementation fileTree(dir: "libs", include: ["*.jar","*.aar"])
    implementation 'com.android.support:multidex:1.0.3'
    implementation 'com.google.android.material:material:1.4.0'
    implementation 'com.google.code.gson:gson:2.8.6'
    implementation 'androidx.appcompat:appcompat:1.3.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"

    implementation(platform("org.jetbrains.kotlin:kotlin-bom:1.8.0"))

    testImplementation 'junit:junit:4.13.2'

    androidTestImplementation 'androidx.test.ext:junit:1.1.3'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'
}
