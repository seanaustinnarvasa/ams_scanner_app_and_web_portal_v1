<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <title>Asset Movement Log</title>
  <link rel="manifest" href="manifest.json">

  <meta charset="UTF-8" />
  <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
  <meta name="description" content="NUSTAR Asset Management System - Real-time asset monitoring and scanner logs" />
  <meta name="app-version" content="__APP_VERSION__" />

  <!-- Mobile responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="NUSTAR" />
  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="icons/apple-touch-icon.png" />

  <!-- Android icons -->
  <link
    rel="icon"
    type="image/png"
    href="icons/android-chrome-512x512.png"
    sizes="512x512" />
  <link
    rel="icon"
    type="image/png"
    href="icons/android-chrome-192x192.png"
    sizes="192x192" />

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"

  <link
    rel="icon"
    type="image/png"
    sizes="16x16"
    href="icons/favicon-16x16.png" />
    
  <link rel="shortcut icon" href="icons/favicon.ico" />

  <script src="flutter.js" defer></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.load({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
