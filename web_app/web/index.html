<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <title>web_app_system</title>
  <link rel="manifest" href="manifest.json">

  <meta charset="UTF-8" />
  <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
  <meta name="description" content="NUSTAR AMS SCANNER LOGS" />
  <meta name="app-version" content="__APP_VERSION__" />

  <!-- ✅ Prevent page from zooming / scaling on mobile -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="src" />
  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="icons/apple-touch-icon.png" />

  <!-- Android icons -->
  <link
    rel="icon"
    type="image/png"
    href="icons/android-chrome-512x512"
    sizes="512x512" />
  <link
    rel="icon"
    type="image/png"
    href="icons/android-chrome-192x192"
    sizes="192x192" />

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="icons/favicon-32x32.png" />
  <link
    rel="icon"
    type="image/png"
    sizes="16x16"
    href="icons/favicon-16x16.png" />
    
  <link rel="shortcut icon" href="icons/favicon.ico" />
  <!-- <link rel="manifest" href="icons/site.webmanifest" /> -->

  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
